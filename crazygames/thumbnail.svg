<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2b2b2b"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#g)" />
  <g transform="translate(80,100)">
    <rect x="0" y="0" width="1120" height="520" rx="18" fill="#171717" stroke="#333" stroke-width="2" />
    <text x="560" y="120" font-family="Arial, Helvetica, sans-serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="700">Dodge the Blocks</text>
    <g transform="translate(160,180)">
      <!-- stylized player square -->
      <rect x="0" y="120" width="60" height="60" fill="#ffffff" rx="6" />
      <!-- falling blocks -->
      <rect x="220" y="20" width="54" height="54" fill="#ff4d4d" rx="6" />
      <rect x="340" y="80" width="40" height="40" fill="#ff6b6b" rx="6" />
      <rect x="460" y="0" width="70" height="70" fill="#ff2d2d" rx="6" />
      <!-- score box -->
      <rect x="740" y="20" width="220" height="64" rx="8" fill="#111" opacity="0.6" />
      <text x="850" y="64" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#fff" text-anchor="middle">Score: 0</text>
    </g>
    <text x="560" y="480" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#bbbbbb" text-anchor="middle">Free to play • Mobile friendly • Click to start</text>
  </g>
</svg>
